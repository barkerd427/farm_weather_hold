name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout module
        uses: actions/checkout@v4
        with:
          path: farm_weather_hold

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: gd, pdo_sqlite, zip
          coverage: none

      - name: Scaffold Drupal + farmOS
        run: |
          composer create-project drupal/recommended-project:^11 site --no-install --no-interaction
          cd site
          composer config --no-plugins allow-plugins.composer/installers true
          composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
          composer config --no-plugins allow-plugins.drupal/core-project-message true
          composer config --no-plugins allow-plugins.cweagans/composer-patches true
          composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer config --no-plugins allow-plugins.phpstan/extension-installer true
          composer install --no-interaction
          # The kernel tests only enable core + drupal/log (+ its state_machine
          # and entity deps) + a local test module that supplies the farmOS-style
          # base fields; no farm_* module is ever enabled, so full farmOS
          # (farmos/farmos) is not required and would not resolve on plain core.
          composer require 'drupal/log:^3' --with-all-dependencies --no-interaction
          composer require --dev drupal/core-dev:^11 drupal/coder mglaman/phpstan-drupal phpstan/extension-installer --no-interaction
          git clone --depth 1 https://github.com/barkerd427/farm_digest.git web/modules/contrib/farm_digest
          ln -s "$GITHUB_WORKSPACE/farm_weather_hold" web/modules/contrib/farm_weather_hold

      - name: PHPCS
        working-directory: site
        run: vendor/bin/phpcs -s -p --standard=web/modules/contrib/farm_weather_hold/phpcs.xml.dist web/modules/contrib/farm_weather_hold

      - name: PHPStan
        working-directory: site
        run: php -d memory_limit=1G vendor/bin/phpstan analyse -c web/modules/contrib/farm_weather_hold/phpstan.neon.dist --no-progress

      - name: PHPUnit
        working-directory: site
        env:
          SIMPLETEST_DB: 'sqlite://localhost//tmp/farm_weather_hold_test.sqlite'
          SIMPLETEST_BASE_URL: 'http://localhost'
          BROWSERTEST_OUTPUT_DIRECTORY: '/tmp/browsertest'
          SYMFONY_DEPRECATIONS_HELPER: 'disabled'
        run: |
          mkdir -p /tmp/browsertest
          php vendor/bin/phpunit -c web/core web/modules/contrib/farm_weather_hold/tests
