services:
  farm_weather_hold.runner:
    class: Drupal\farm_weather_hold\Cron\WeatherHoldRunner
    arguments:
      - '@state'
      - '@datetime.time'
      - '@config.factory'
      - '@entity_type.manager'
      - '@farm_weather_hold.weather_provider'
      - '@farm_weather_hold.coordinates_resolver'
      - '@logger.factory'

  farm_weather_hold.coordinates_resolver:
    class: Drupal\farm_weather_hold\CoordinatesResolver
    arguments:
      - '@config.factory'

  farm_weather_hold.weather_provider:
    class: Drupal\farm_weather_hold\OpenMeteoWeatherProvider
    arguments:
      - '@http_client'
      - '@cache.default'
      - '@datetime.time'

  farm_weather_hold.defer_calculator:
    class: Drupal\farm_weather_hold\DeferCalculator
